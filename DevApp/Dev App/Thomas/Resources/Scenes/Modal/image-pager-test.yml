version: 1
presentation:
  type: modal
  default_placement:
    size:
      width: 100%
      height: 100%
    ignore_safe_area: true
    shade_color:
      default:
        hex: '#000000'
        alpha: 0.4
  dismiss_on_touch_outside: false
view:
  type: pager_controller
  identifier: image-pager-controller
  view:
    type: container
    background_color:
      default:
        type: hex
        hex: '#1A1A2E'
        alpha: 1
    items:
      - position:
          horizontal: center
          vertical: center
        size:
          width: 100%
          height: 100%
        view:
          type: pager
          gestures:
            - type: swipe
              identifier: swipe-up-dismiss
              direction: up
              behavior:
                behaviors:
                  - dismiss
          items:
            # PAGE 1 - Large landscape image
            - identifier: page-1
              type: pager_item
              view:
                type: container
                items:
                  - position:
                      horizontal: center
                      vertical: center
                    size:
                      width: 100%
                      height: 100%
                    ignore_safe_area: true
                    view:
                      type: media
                      identifier: image-1
                      media_type: image
                      media_fit: center_crop
                      url: "https://picsum.photos/id/10/1200/800"
                  - position:
                      horizontal: center
                      vertical: bottom
                    margin:
                      bottom: 80
                      start: 16
                      end: 16
                    size:
                      width: 100%
                      height: auto
                    view:
                      type: linear_layout
                      direction: vertical
                      items:
                        - size:
                            width: 100%
                            height: auto
                          view:
                            type: label
                            text: "Page 1 — Landscape Photo"
                            text_appearance:
                              font_size: 22
                              alignment: center
                              color:
                                default:
                                  type: hex
                                  hex: '#FFFFFF'
                                  alpha: 1
                              styles:
                                - bold
                        - size:
                            width: 100%
                            height: auto
                          margin:
                            top: 6
                          view:
                            type: label
                            text: "Swipe left/right to change pages. Each page loads a different image."
                            text_appearance:
                              font_size: 14
                              alignment: center
                              color:
                                default:
                                  type: hex
                                  hex: '#FFFFFF'
                                  alpha: 0.8

            # PAGE 2 - Portrait-style image
            - identifier: page-2
              type: pager_item
              view:
                type: container
                items:
                  - position:
                      horizontal: center
                      vertical: center
                    size:
                      width: 100%
                      height: 100%
                    ignore_safe_area: true
                    view:
                      type: media
                      identifier: image-2
                      media_type: image
                      media_fit: center_crop
                      url: "https://picsum.photos/id/29/1200/800"
                  - position:
                      horizontal: center
                      vertical: bottom
                    margin:
                      bottom: 80
                      start: 16
                      end: 16
                    size:
                      width: 100%
                      height: auto
                    view:
                      type: linear_layout
                      direction: vertical
                      items:
                        - size:
                            width: 100%
                            height: auto
                          view:
                            type: label
                            text: "Page 2 — Nature Scene"
                            text_appearance:
                              font_size: 22
                              alignment: center
                              color:
                                default:
                                  type: hex
                                  hex: '#FFFFFF'
                                  alpha: 1
                              styles:
                                - bold
                        - size:
                            width: 100%
                            height: auto
                          margin:
                            top: 6
                          view:
                            type: label
                            text: "This image loads independently from the others."
                            text_appearance:
                              font_size: 14
                              alignment: center
                              color:
                                default:
                                  type: hex
                                  hex: '#FFFFFF'
                                  alpha: 0.8

            # PAGE 3 - Another distinct image
            - identifier: page-3
              type: pager_item
              view:
                type: container
                items:
                  - position:
                      horizontal: center
                      vertical: center
                    size:
                      width: 100%
                      height: 100%
                    ignore_safe_area: true
                    view:
                      type: media
                      identifier: image-3
                      media_type: image
                      media_fit: center_crop
                      url: "https://picsum.photos/id/47/1200/800"
                  - position:
                      horizontal: center
                      vertical: bottom
                    margin:
                      bottom: 80
                      start: 16
                      end: 16
                    size:
                      width: 100%
                      height: auto
                    view:
                      type: linear_layout
                      direction: vertical
                      items:
                        - size:
                            width: 100%
                            height: auto
                          view:
                            type: label
                            text: "Page 3 — Architecture"
                            text_appearance:
                              font_size: 22
                              alignment: center
                              color:
                                default:
                                  type: hex
                                  hex: '#FFFFFF'
                                  alpha: 1
                              styles:
                                - bold
                        - size:
                            width: 100%
                            height: auto
                          margin:
                            top: 6
                          view:
                            type: label
                            text: "Swiping back should show the cached image without re-fetching."
                            text_appearance:
                              font_size: 14
                              alignment: center
                              color:
                                default:
                                  type: hex
                                  hex: '#FFFFFF'
                                  alpha: 0.8

            # PAGE 4 - GIF to test animated image loading
            - identifier: page-4
              type: pager_item
              view:
                type: container
                items:
                  - position:
                      horizontal: center
                      vertical: center
                    size:
                      width: 100%
                      height: 100%
                    ignore_safe_area: true
                    view:
                      type: media
                      identifier: image-4
                      media_type: image
                      media_fit: center_inside
                      url: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExcDVwOWprNHRiYWxjdnQ3MjBtamc0YnI2cTNraTRlaGh6aGl4NXQ1aiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7aD2saalBwwftBIY/giphy.gif"
                  - position:
                      horizontal: center
                      vertical: bottom
                    margin:
                      bottom: 80
                      start: 16
                      end: 16
                    size:
                      width: 100%
                      height: auto
                    view:
                      type: linear_layout
                      direction: vertical
                      items:
                        - size:
                            width: 100%
                            height: auto
                          view:
                            type: label
                            text: "Page 4 — Animated GIF"
                            text_appearance:
                              font_size: 22
                              alignment: center
                              color:
                                default:
                                  type: hex
                                  hex: '#FFFFFF'
                                  alpha: 1
                              styles:
                                - bold
                        - size:
                            width: 100%
                            height: auto
                          margin:
                            top: 6
                          view:
                            type: label
                            text: "Tests animated image loading and frame playback."
                            text_appearance:
                              font_size: 14
                              alignment: center
                              color:
                                default:
                                  type: hex
                                  hex: '#FFFFFF'
                                  alpha: 0.8

            # PAGE 5 - Large high-res image
            - identifier: page-5
              type: pager_item
              view:
                type: container
                items:
                  - position:
                      horizontal: center
                      vertical: center
                    size:
                      width: 100%
                      height: 100%
                    ignore_safe_area: true
                    view:
                      type: media
                      identifier: image-5
                      media_type: image
                      media_fit: center_crop
                      url: "https://picsum.photos/id/65/2000/1400"
                  - position:
                      horizontal: center
                      vertical: bottom
                    margin:
                      bottom: 80
                      start: 16
                      end: 16
                    size:
                      width: 100%
                      height: auto
                    view:
                      type: linear_layout
                      direction: vertical
                      items:
                        - size:
                            width: 100%
                            height: auto
                          view:
                            type: label
                            text: "Page 5 — High Resolution"
                            text_appearance:
                              font_size: 22
                              alignment: center
                              color:
                                default:
                                  type: hex
                                  hex: '#FFFFFF'
                                  alpha: 1
                              styles:
                                - bold
                        - size:
                            width: 100%
                            height: auto
                          margin:
                            top: 6
                          view:
                            type: label
                            text: "2000x1400 image to test loading larger assets."
                            text_appearance:
                              font_size: 14
                              alignment: center
                              color:
                                default:
                                  type: hex
                                  hex: '#FFFFFF'
                                  alpha: 0.8

      # Dismiss button
      - position:
          horizontal: end
          vertical: top
        size:
          width: 48
          height: 48
        margin:
          top: 8
          end: 8
        view:
          type: image_button
          identifier: dismiss_button
          button_click:
            - dismiss
          localized_content_description:
            refs:
              - ua_dismiss
            fallback: Dismiss
          image:
            type: icon
            icon: close
            scale: 0.4
            color:
              default:
                type: hex
                hex: '#FFFFFF'
                alpha: 1

      # Pager indicator
      - position:
          horizontal: center
          vertical: bottom
        margin:
          bottom: 24
        size:
          width: auto
          height: 8
        view:
          type: pager_indicator
          spacing: 8
          bindings:
            selected:
              shapes:
                - type: ellipse
                  scale: 1
                  color:
                    default:
                      type: hex
                      hex: '#FFFFFF'
                      alpha: 1
            unselected:
              shapes:
                - type: ellipse
                  scale: 1
                  color:
                    default:
                      type: hex
                      hex: '#FFFFFF'
                      alpha: 0.4
display_type: layout
name: Image Pager Test
