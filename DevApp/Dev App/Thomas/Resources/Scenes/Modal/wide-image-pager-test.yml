version: 1
presentation:
  type: modal
  default_placement:
    size:
      width: 100%
      height: 100%
    ignore_safe_area: true
    shade_color:
      default:
        hex: '#000000'
        alpha: 0.4
  dismiss_on_touch_outside: false
view:
  type: pager_controller
  identifier: wide-image-pager-controller
  view:
    type: container
    background_color:
      default:
        type: hex
        hex: '#1A1A2E'
        alpha: 1
    items:
      - position:
          horizontal: center
          vertical: center
        size:
          width: 100%
          height: 100%
        view:
          type: pager
          items:
            # PAGE 1 - Super wide aspect ratio image, center_crop overflows
            - identifier: page-wide-1
              type: pager_item
              view:
                type: container
                items:
                  - position:
                      horizontal: center
                      vertical: center
                    size:
                      width: 100%
                      height: 100%
                    view:
                      type: media
                      identifier: wide-image-1
                      media_type: image
                      media_fit: fit_crop
                      position:
                        horizontal: center
                        vertical: center
                      url: "https://picsum.photos/id/10/5000/400"
                  - position:
                      horizontal: center
                      vertical: bottom
                    margin:
                      bottom: 100
                    size:
                      width: 100%
                      height: auto
                    view:
                      type: label
                      text: "Page 1 — Wide Aspect Ratio (15:1) center_crop"
                      text_appearance:
                        font_size: 20
                        alignment: center
                        color:
                          default:
                            type: hex
                            hex: '#FFFFFF'
                            alpha: 1
                        styles:
                          - bold

            # PAGE 2 - Button page (test if touches work)
            - identifier: page-button
              type: pager_item
              view:
                type: container
                background_color:
                  default:
                    type: hex
                    hex: '#2D2D44'
                    alpha: 1
                items:
                  - position:
                      horizontal: center
                      vertical: center
                    size:
                      width: 80%
                      height: auto
                    view:
                      type: linear_layout
                      direction: vertical
                      items:
                        - size:
                            width: 100%
                            height: auto
                          margin:
                            bottom: 16
                          view:
                            type: label
                            text: "Page 2 — Button Test"
                            text_appearance:
                              font_size: 24
                              alignment: center
                              color:
                                default:
                                  type: hex
                                  hex: '#FFFFFF'
                                  alpha: 1
                              styles:
                                - bold
                        - size:
                            width: 100%
                            height: auto
                          margin:
                            bottom: 24
                          view:
                            type: label
                            text: "If the wide images from pages 1 & 3 block touches, this button won't work."
                            text_appearance:
                              font_size: 14
                              alignment: center
                              color:
                                default:
                                  type: hex
                                  hex: '#FFFFFF'
                                  alpha: 0.7
                        - size:
                            width: 100%
                            height: 50
                          view:
                            type: label_button
                            identifier: test-button
                            label:
                              type: label
                              text: "TAP ME — Dismiss"
                              text_appearance:
                                font_size: 18
                                alignment: center
                                color:
                                  default:
                                    type: hex
                                    hex: '#FFFFFF'
                                    alpha: 1
                                styles:
                                  - bold
                            background_color:
                              default:
                                type: hex
                                hex: '#4CAF50'
                                alpha: 1
                            border:
                              radius: 12
                            button_click:
                              - dismiss

            # PAGE 3 - Another super wide aspect ratio image, center_crop overflows
            - identifier: page-wide-3
              type: pager_item
              view:
                type: container
                items:
                  - position:
                      horizontal: center
                      vertical: center
                    size:
                      width: 100%
                      height: 300
                    view:
                      type: media
                      identifier: wide-image-3
                      media_type: image
                      media_fit: fit_crop
                      position:
                        horizontal: center
                        vertical: center
                      url: "https://picsum.photos/id/47/5000/400"
                  - position:
                      horizontal: center
                      vertical: bottom
                    margin:
                      bottom: 100
                    size:
                      width: 100%
                      height: auto
                    view:
                      type: label
                      text: "Page 3 — Wide Aspect Ratio (15:1) center_crop"
                      text_appearance:
                        font_size: 20
                        alignment: center
                        color:
                          default:
                            type: hex
                            hex: '#FFFFFF'
                            alpha: 1
                        styles:
                          - bold

      # Dismiss button
      - position:
          horizontal: end
          vertical: top
        size:
          width: 48
          height: 48
        margin:
          top: 8
          end: 8
        view:
          type: image_button
          identifier: dismiss_button
          button_click:
            - dismiss
          localized_content_description:
            refs:
              - ua_dismiss
            fallback: Dismiss
          image:
            type: icon
            icon: close
            scale: 0.4
            color:
              default:
                type: hex
                hex: '#FFFFFF'
                alpha: 1

      # Pager indicator
      - position:
          horizontal: center
          vertical: bottom
        margin:
          bottom: 24
        size:
          width: auto
          height: 8
        view:
          type: pager_indicator
          spacing: 8
          bindings:
            selected:
              shapes:
                - type: ellipse
                  scale: 1
                  color:
                    default:
                      type: hex
                      hex: '#FFFFFF'
                      alpha: 1
            unselected:
              shapes:
                - type: ellipse
                  scale: 1
                  color:
                    default:
                      type: hex
                      hex: '#FFFFFF'
                      alpha: 0.4
display_type: layout
name: Wide Image Pager Test
