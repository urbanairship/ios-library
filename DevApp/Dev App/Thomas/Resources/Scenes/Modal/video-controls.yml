version: 1
presentation:
  type: modal
  default_placement:
    size:
      width: 100%
      height: 100%
    ignore_safe_area: true
    shade_color:
      default:
        hex: '#000000'
        alpha: 0.2
  dismiss_on_touch_outside: false
view:
  type: video_controller
  identifier: vc-parent
  mute_group:
    identifier: shared-mute
  view:
    type: pager_controller
    identifier: pager-controller
    view:
      type: container
      background_color:
        default:
          type: hex
          hex: '#000000'
          alpha: 1
      items:
        - position:
            horizontal: center
            vertical: center
          size:
            width: 100%
            height: 100%
          ignore_safe_area: true
          view:
            type: pager
            gestures:
              - type: swipe
                identifier: swipe-up-id
                direction: up
                behavior:
                  behaviors:
                    - dismiss
            items:
              # PAGE 1
              - identifier: page-1
                type: pager_item
                view:
                  type: video_controller
                  identifier: vc-page-1
                  mute_group:
                    identifier: shared-mute
                  view:
                    type: container
                    items:
                      - position:
                          horizontal: center
                          vertical: center
                        size:
                          width: 100%
                          height: 100%
                        ignore_safe_area: true
                        view:
                          type: media
                          identifier: video-1
                          media_type: video
                          media_fit: center_crop
                          url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"
                          video:
                            aspect_ratio: 1.77777777777778
                            autoplay: true
                            muted: true
                            loop: true
                            show_controls: false
                      - position:
                          horizontal: center
                          vertical: top
                        margin:
                          top: 64
                          start: 16
                          end: 16
                        size:
                          width: 100%
                          height: auto
                        view:
                          type: linear_layout
                          direction: vertical
                          items:
                            - size:
                                width: 100%
                                height: auto
                              view:
                                type: label
                                text: "Page 1 — Big Buck Bunny"
                                text_appearance:
                                  font_size: 24
                                  alignment: center
                                  color:
                                    default:
                                      type: hex
                                      hex: '#FFFFFF'
                                      alpha: 1
                                  styles:
                                    - bold
                            - size:
                                width: 100%
                                height: auto
                              margin:
                                top: 6
                              view:
                                type: label
                                text: "Muting here mutes all pages (shared mute group)."
                                text_appearance:
                                  font_size: 14
                                  alignment: center
                                  color:
                                    default:
                                      type: hex
                                      hex: '#FFFFFF'
                                      alpha: 0.85
                      - position:
                          horizontal: center
                          vertical: bottom
                        margin:
                          bottom: 40
                        size:
                          width: auto
                          height: auto
                        view:
                          type: linear_layout
                          direction: horizontal
                          items:
                            - size:
                                width: 56
                                height: 56
                              margin:
                                end: 16
                              view:
                                type: stack_image_button
                                identifier: play_pause_btn_1
                                button_click:
                                  - video_toggle_play
                                localized_content_description:
                                  refs:
                                    - ua_play
                                  fallback: Play
                                items:
                                  - type: icon
                                    icon:
                                      type: icon
                                      icon: play
                                      color:
                                        default:
                                          type: hex
                                          hex: '#FFFFFF'
                                          alpha: 1
                                      scale: 0.5
                                view_overrides:
                                  localized_content_description:
                                    - value:
                                        refs:
                                          - ua_pause
                                        fallback: Pause
                                      when_state_matches:
                                        scope:
                                          - $video
                                          - current
                                          - playing
                                        value:
                                          equals: true
                                  items:
                                    - value:
                                        - type: icon
                                          icon:
                                            type: icon
                                            icon: pause
                                            color:
                                              default:
                                                type: hex
                                                hex: '#FFFFFF'
                                                alpha: 1
                                            scale: 0.5
                                      when_state_matches:
                                        scope:
                                          - $video
                                          - current
                                          - playing
                                        value:
                                          equals: true
                            - size:
                                width: 56
                                height: 56
                              view:
                                type: stack_image_button
                                identifier: mute_btn_1
                                button_click:
                                  - video_toggle_mute
                                localized_content_description:
                                  refs:
                                    - ua_mute
                                  fallback: Mute
                                items:
                                  - type: icon
                                    icon:
                                      type: icon
                                      icon: unmute
                                      color:
                                        default:
                                          type: hex
                                          hex: '#FFFFFF'
                                          alpha: 1
                                      scale: 0.5
                                view_overrides:
                                  localized_content_description:
                                    - value:
                                        refs:
                                          - ua_unmute
                                        fallback: Unmute
                                      when_state_matches:
                                        scope:
                                          - $video
                                          - current
                                          - muted
                                        value:
                                          equals: true
                                  items:
                                    - value:
                                        - type: icon
                                          icon:
                                            type: icon
                                            icon: mute
                                            color:
                                              default:
                                                type: hex
                                                hex: '#FFFFFF'
                                                alpha: 1
                                            scale: 0.5
                                      when_state_matches:
                                        scope:
                                          - $video
                                          - current
                                          - muted
                                        value:
