        # Dismiss button (overlay on top of pager)
        - position:
            horizontal: end
            vertical: top
          size:
            width: 48
            height: 48
          view:
            type: image_button
            identifier: dismiss_button
            button_click:
              - dismiss
            localized_content_description:
              refs:
                - ua_dismiss
              fallback: Dismiss
            image:
              type: icon
              icon: close
              scale: 0.4
              color:
                default:
                  type: hex
                  hex: '#FFFFFF'
                  alpha: 1

        # Pager indicator
        - position:
            horizontal: center
            vertical: bottom
          margin:
            bottom: 16
          size:
            width: auto
            height: 8
          view:
            type: pager_indicator
            spacing: 8
            bindings:
              selected:
                shapes:
                  - type: ellipse
                    scale: 1
                    color:
                      default:
                        type: hex
                        hex: '#FFFFFF'
                        alpha: 1
              unselected:
                shapes:
                  - type: ellipse
                    scale: 1
                    color:
                      default:
                        type: hex
                        hex: '#FFFFFF'
                        alpha: 0.4
display_type: layout
name: Video Controls
